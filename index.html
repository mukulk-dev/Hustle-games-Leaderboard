<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hustle Games — Results</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0D0C2C;
    font-family: 'Inter', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    position: relative;
  }

  .bg-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(233,169,32,0.08) 0%, rgba(13,12,44,0) 70%);
    pointer-events: none;
  }

  .brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 0.12em;
    color: #5A579A;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .icon-ring {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: #18174A;
    border: 1px solid #252364;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }

  .icon-ring svg {
    width: 32px;
    height: 32px;
    stroke: #E9A920;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 9vw, 76px);
    line-height: 0.98;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  h1 span {
    color: #E9A920;
  }

  p.sub {
    font-size: 15px;
    line-height: 1.6;
    color: #C8C5E6;
    max-width: 420px;
    margin-bottom: 30px;
  }

  .thanks {
    background: #131236;
    border: 1px solid #252364;
    border-radius: 10px;
    padding: 14px 22px;
    font-size: 13px;
    color: #FFFFFF;
  }

  .thanks strong {
    color: #E9A920;
    font-weight: 600;
  }

  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 32px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #5A579A;
    font-weight: 600;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #E9A920;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  @media (prefers-reduced-motion: reduce) {
    .dot { animation: none; }
  }
</style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="brand">Hustle Games</div>

  <div class="icon-ring">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 21h8" />
      <path d="M12 17v4" />
      <path d="M7 4h10" />
      <path d="M17 4v3a5 5 0 0 1-10 0V4" />
      <path d="M5 4h2v3a3 3 0 0 1-3-3z" />
      <path d="M19 4h-2v3a3 3 0 0 0 3-3z" />
    </svg>
  </div>

  <h1>Results will be<br><span>announced soon</span></h1>

  <p class="sub">The leaderboard is closed and every entry is being verified.</p>

  <div class="thanks">
    <strong>Hang tight</strong> — results are just around the corner.
  </div>

  <div class="status-dot">
    <span class="dot"></span>
    Results announcement pending
  </div>

</body>
</html>
